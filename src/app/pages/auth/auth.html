<body>
    <div class="auth-container">

        <h2>{{isLoginMode ? 'login' : 'Cadastro'}}</h2>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">


        <div *ngIf="!isLoginMode">
            <label for="name">Nome : </label>
            <input id="name" formControlNome="name">
        </div>


        <label for="email">Email :</label>
        <input id="email" type="email" formControlName="email">


        <label for="password">Senha :</label>
        <input id="password" type="password" formControlName="password" [placeholder]="isLoginMode ? ''
         : 'Informe pelo menos 6 Digitos'">
         
         <button type="submit">{{isLoginMode ? 'Entre' : 'Cadastro'}}</button>



        </form>

        <p>
            {{isLoginMode ? 'Não tem conta' : 'Já tem Conta'}}
            <button (click)="toggleMode()">{{isLoginMode ? 'Criar Conta' : 'Fazer login'}}</button>
        </p>


    </div>
</body>
